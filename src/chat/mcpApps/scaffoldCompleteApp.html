<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Scaffold Complete</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
            font-size: var(--vscode-font-size, 13px);
            color: var(--vscode-foreground, #cccccc);
            background: transparent;
            padding: 8px;
        }

        .scaffold-card {
            border: 1px solid var(--vscode-panel-border, rgba(255, 255, 255, 0.1));
            border-radius: 6px;
            padding: 14px;
            max-width: 360px;
            background: var(--vscode-editor-background, #1e1e1e);
        }

        .scaffold-card h3 {
            margin-bottom: 6px;
            font-size: 1em;
            font-weight: 600;
        }

        .scaffold-card p {
            margin-bottom: 12px;
            color: var(--vscode-descriptionForeground, #999);
            font-size: 0.92em;
            line-height: 1.4;
        }

        .scaffold-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95em;
            font-family: inherit;
            font-weight: 600;
            transition: background 0.15s;
            width: 100%;
        }

        .scaffold-btn.primary {
            background: var(--vscode-button-background, #0e639c);
            color: var(--vscode-button-foreground, #ffffff);
        }

        .scaffold-btn.primary:hover:not(:disabled) {
            background: var(--vscode-button-hoverBackground, #1177bb);
        }

        .scaffold-btn:focus-visible {
            outline: 2px solid var(--vscode-focusBorder, #007fd4);
            outline-offset: 1px;
        }

        .scaffold-btn:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .button-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-msg {
            margin-top: 10px;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .status-msg.info {
            color: var(--vscode-descriptionForeground, #999);
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="scaffold-card">
        <h3>Project scaffolding complete!</h3>
        <p>Would you like to set up local development?</p>
        <div class="button-row">
            <button class="scaffold-btn primary" id="debugBtn">Set Up Local Development</button>
        </div>
        <p class="status-msg" id="status" hidden></p>
    </div>

    <script>
        class McpApp {
            constructor(appInfo) {
                this._appInfo = appInfo;
                this._nextId = 0;
                this._pending = new Map();
            }

            async connect() {
                window.addEventListener("message", (e) => {
                    const msg = e.data;
                    if (!msg || msg.jsonrpc !== "2.0") return;
                    if ("id" in msg && ("result" in msg || "error" in msg)) {
                        const p = this._pending.get(msg.id);
                        if (!p) return;
                        this._pending.delete(msg.id);
                        msg.error ? p.reject(new Error(msg.error.message)) : p.resolve(msg.result);
                    }
                });

                await this._request("ui/initialize", {
                    appInfo: this._appInfo,
                    appCapabilities: {},
                    protocolVersion: "2026-01-26",
                });
                this._notify("ui/notifications/initialized", {});
                this._autoResize();
            }

            callServerTool(params) { return this._request("tools/call", params); }

            _request(method, params) {
                return new Promise((resolve, reject) => {
                    const id = ++this._nextId;
                    this._pending.set(id, { resolve, reject });
                    window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
                });
            }

            _notify(method, params) {
                window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
            }

            _autoResize() {
                let busy = false, lw = 0, lh = 0;
                const update = () => {
                    if (busy) return;
                    busy = true;
                    requestAnimationFrame(() => {
                        busy = false;
                        const el = document.documentElement;
                        const sw = el.style.width, sh = el.style.height;
                        el.style.width = "fit-content"; el.style.height = "fit-content";
                        const r = el.getBoundingClientRect();
                        el.style.width = sw; el.style.height = sh;
                        const pad = window.innerWidth - el.clientWidth;
                        const w = Math.ceil(r.width + pad), h = Math.ceil(r.height);
                        if (w !== lw || h !== lh) { lw = w; lh = h; this._notify("ui/notifications/size-changed", { width: w, height: h }); }
                    });
                };
                update();
                const obs = new ResizeObserver(update);
                obs.observe(document.documentElement);
                obs.observe(document.body);
            }
        }

        const debugBtn = document.getElementById("debugBtn");
        const status = document.getElementById("status");
        const app = new McpApp({ name: "Scaffold Complete", version: "1.0.0" });

        debugBtn.addEventListener("click", async () => {
            debugBtn.disabled = true;
            status.hidden = false;
            status.className = "status-msg info";
            status.textContent = "Setting up local development…";
            await app.callServerTool({
                name: "report_scaffold_choice",
                arguments: { choice: "debug" },
            });
        });

        app.connect();
    </script>
</body>

</html>
